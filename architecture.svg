  <!-- ===== USER LAYER ===== -->

  <!-- Chat input box -->

  <g class="node c-purple" onclick="sendPrompt('How does the user interact with the AI agent?')">

    <rect x="214" y="76" width="252" height="52" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="340" y="97" text-anchor="middle" dominant-baseline="central">User natural language input</text>

    <text class="ts" x="340" y="115" text-anchor="middle" dominant-baseline="central">"Edit intro chapter of Q3 Report"</text>

  </g>



  <!-- ===== ARROW: user → intent detector ===== -->

  <line x1="340" y1="128" x2="340" y2="192" class="arr" stroke="#7F77DD" marker-end="url(#arrow)"></line>

  <text class="ts" x="348" y="163" style="fill:var(--color-text-tertiary)">natural language</text>



  <!-- ===== AGENT CORE LAYER ===== -->

  <!-- Step 1: Intent Detector -->

  <g class="node c-teal" onclick="sendPrompt('How does intent detection work in the AI agent?')">

    <rect x="60" y="192" width="168" height="56" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="144" y="213" text-anchor="middle" dominant-baseline="central">Intent detector</text>

    <text class="ts" x="144" y="231" text-anchor="middle" dominant-baseline="central">LLM classifies request</text>

  </g>



  <!-- Step 2: Intent Registry -->

  <g class="node c-teal" onclick="sendPrompt('What is the intent registry and how does it work?')">

    <rect x="256" y="192" width="168" height="56" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="340" y="213" text-anchor="middle" dominant-baseline="central">Intent registry</text>

    <text class="ts" x="340" y="231" text-anchor="middle" dominant-baseline="central">Pre-defined resource:action map</text>

  </g>



  <!-- Step 3: Context resolver -->

  <g class="node c-teal" onclick="sendPrompt('How does context resolution work — finding the right document or chapter?')">

    <rect x="452" y="192" width="168" height="56" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="536" y="213" text-anchor="middle" dominant-baseline="central">Context resolver</text>

    <text class="ts" x="536" y="231" text-anchor="middle" dominant-baseline="central">Identifies resource + target</text>

  </g>



  <!-- Arrows across agent core -->

  <line x1="228" y1="220" x2="254" y2="220" class="arr" marker-end="url(#arrow)"></line>

  <line x1="424" y1="220" x2="450" y2="220" class="arr" marker-end="url(#arrow)"></line>



  <!-- Intent Resolved box (central, below) -->

  <g class="node c-purple" onclick="sendPrompt('What does a resolved intent look like as a data structure?')">

    <rect x="214" y="298" width="252" height="64" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="340" y="318" text-anchor="middle" dominant-baseline="central">Resolved intent object</text>

    <text class="ts" x="340" y="338" text-anchor="middle">intent: document:write</text>

    <text class="ts" x="340" y="352" text-anchor="middle">resource: chapter · id: ch_intro</text>

  </g>



  <!-- Connectors from agent core down to intent object -->

  <path d="M144 248 L144 330 L212 330" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.5" marker-end="url(#arrow)"></path>

  <line x1="340" y1="248" x2="340" y2="298" class="arr" marker-end="url(#arrow)"></line>

  <path d="M536 248 L536 330 L468 330" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.5" marker-end="url(#arrow)"></path>



  <!-- ===== ARROW: intent object → action router ===== -->

  <line x1="340" y1="362" x2="340" y2="412" class="arr" marker-end="url(#arrow)"></line>



  <!-- Action Router (bridge row) -->

  <g class="node c-coral" onclick="sendPrompt('How does the action router decide which path to take?')">

    <rect x="214" y="412" width="252" height="50" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="340" y="432" text-anchor="middle" dominant-baseline="central">Action router</text>

    <text class="ts" x="340" y="450" text-anchor="middle" dominant-baseline="central">Selects handler by intent type</text>

  </g>



  <!-- ===== DISPATCH LAYER ===== -->

  <!-- Left path: Backend/DB actions -->

  <path d="M280 462 L144 462 L144 466" fill="none" stroke="#D85A30" stroke-width="0.5" marker-end="url(#arrow)"></path>



  <g class="node c-coral" onclick="sendPrompt('What kinds of tasks go to the backend handler?')">

    <rect x="60" y="466" width="168" height="56" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="144" y="487" text-anchor="middle" dominant-baseline="central">Backend handler</text>

    <text class="ts" x="144" y="505" text-anchor="middle" dominant-baseline="central">document:read/write, project ops</text>

  </g>



  <!-- Right path: Frontend/Nav actions -->

  <path d="M400 462 L536 462 L536 466" fill="none" stroke="#D85A30" stroke-width="0.5" marker-end="url(#arrow)"></path>



  <g class="node c-amber" onclick="sendPrompt('What kinds of commands go to the frontend handler?')">

    <rect x="452" y="466" width="168" height="56" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="536" y="487" text-anchor="middle" dominant-baseline="central">Frontend handler</text>

    <text class="ts" x="536" y="505" text-anchor="middle" dominant-baseline="central">route:navigate, UI commands</text>

  </g>



  <!-- Structured response boxes -->

  <g class="node c-gray" onclick="sendPrompt('What does the structured response JSON look like for a document edit?')">

    <rect x="60" y="556" width="168" height="56" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="144" y="577" text-anchor="middle" dominant-baseline="central">Action response</text>

    <text class="ts" x="144" y="595" text-anchor="middle" dominant-baseline="central">{ intent, resource, payload }</text>

  </g>



  <g class="node c-gray" onclick="sendPrompt('What does the navigation command JSON look like?')">

    <rect x="452" y="556" width="168" height="56" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="536" y="577" text-anchor="middle" dominant-baseline="central">Navigation command</text>

    <text class="ts" x="536" y="595" text-anchor="middle" dominant-baseline="central">{ intent: navigate, path }</text>

  </g>



  <line x1="144" y1="522" x2="144" y2="556" class="arr" marker-end="url(#arrow)"></line>

  <line x1="536" y1="522" x2="536" y2="556" class="arr" marker-end="url(#arrow)"></line>



  <!-- ===== SYSTEMS LAYER ===== -->

  <!-- DB/Backend system -->

  <g class="node c-blue" onclick="sendPrompt('What does the backend and database layer do in this system?')">

    <rect x="60" y="658" width="168" height="56" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="144" y="679" text-anchor="middle" dominant-baseline="central">Backend + DB</text>

    <text class="ts" x="144" y="697" text-anchor="middle" dominant-baseline="central">Stores docs, projects, teams</text>

  </g>



  <!-- Frontend system -->

  <g class="node c-green" onclick="sendPrompt('What does the frontend do after it receives an agent command?')">

    <rect x="452" y="658" width="168" height="56" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="536" y="679" text-anchor="middle" dominant-baseline="central">Frontend (React/TS)</text>

    <text class="ts" x="536" y="697" text-anchor="middle" dominant-baseline="central">Renders, navigates, updates UI</text>

  </g>



  <line x1="144" y1="612" x2="144" y2="658" class="arr" marker-end="url(#arrow)"></line>

  <line x1="536" y1="612" x2="536" y2="658" class="arr" marker-end="url(#arrow)"></line>



  <!-- Response arrows back to user (dashed) -->

  <path d="M144 714 L144 760 L300 760 L300 760" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" mask="url(#imagine-text-gaps-sozylu)"></path>

  <path d="M536 714 L536 760 L380 760 L380 760" fill="none" stroke="var(--color-border-secondary)" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)" mask="url(#imagine-text-gaps-sozylu)"></path>



  <!-- Response label -->

  <g class="node c-purple" onclick="sendPrompt('What does the user see after the agent completes the task?')">

    <rect x="214" y="740" width="252" height="48" rx="8" stroke-width="0.5"></rect>

    <text class="th" x="340" y="760" text-anchor="middle" dominant-baseline="central">Response rendered to user</text>

    <text class="ts" x="340" y="778" text-anchor="middle" dominant-baseline="central">Edit applied · page navigated · etc.</text>

  </g>



